default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use a recent version
    hooks:
      - id: trailing-whitespace
        # Skill signature blobs must keep their exact bytes or signature
        # verification breaks.
        exclude: '\.oms\.sig$'
      - id: end-of-file-fixer
        exclude: '\.oms\.sig$'
      - id: check-yaml
      - id: check-json
        # chezmoi modify_ scripts target *.json files but are executable
        # scripts (shell + jq), not JSON documents.
        exclude: '(^|/)modify_.*\.json$'
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-added-large-files
      - id: file-contents-sorter
        files: ^Brewfile$
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      # Prebuilt-binary variant: the default `stylua` hook (language: rust)
      # builds from source and needs a C linker, which isn't available on
      # minimal Linux hosts like TrueNAS where apt is disabled.
      - id: stylua-github
  - repo: local
    hooks:
      # Validate justfile roots parse + evaluate (catches undefined variables
      # across imported fragments — see scripts/check-justfiles.sh).
      - id: check-justfiles
        name: check justfiles parse and evaluate
        entry: scripts/check-justfiles.sh
        language: script
        files: '(^|/)(justfile$|.*\.just$)'
        pass_filenames: false
      # Always-loaded Claude global context stays within budget (total size,
      # per-file cap, repo-specific markers, paths: frontmatter validity).
      - id: claude-context-budget
        name: check Claude global context budget
        entry: tests/test-claude-context-budget.sh
        language: script
        files: '^(exact_dot_claude/(rules/.*\.md|CLAUDE\.md)|tests/test-claude-context-budget\.sh)$'
        pass_filenames: false
      # Advisory doc-drift nudge: flags docs that reference scripts/paths/links
      # which no longer exist. ADVISORY (always exits 0) so it never blocks a
      # commit; `mise run lint:docs` is the strict/enforcing variant for CI.
      # See scripts/check-doc-references.py and .doc-reference-allow.
      - id: check-doc-references
        name: check docs for dangling references (advisory)
        entry: scripts/check-doc-references.py
        language: script
        pass_filenames: false
        always_run: true
        verbose: true
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
