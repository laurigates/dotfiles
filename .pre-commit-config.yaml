default_install_hook_types:
  - pre-commit
  - commit-msg
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0 # Use a recent version
    hooks:
      - id: trailing-whitespace
        # Skill signature blobs must keep their exact bytes or signature
        # verification breaks.
        exclude: '\.oms\.sig$'
      - id: end-of-file-fixer
        exclude: '\.oms\.sig$'
      - id: check-yaml
      - id: check-json
        # chezmoi modify_ scripts target *.json files but are executable
        # scripts (shell + jq), not JSON documents.
        exclude: '(^|/)modify_.*\.json$'
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-added-large-files
      - id: file-contents-sorter
        files: ^Brewfile$
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/JohnnyMorganz/StyLua
    rev: v2.1.0
    hooks:
      # Use language: rust hook (compiles from source). The stylua-github
      # variant downloads prebuilt binaries but hits GitHub API rate limits
      # in CI without auth tokens. Compilation is cached by pre-commit.
      - id: stylua
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
